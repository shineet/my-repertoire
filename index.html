    <!-- Distinct dock/home-screen icon (gold top hat) so it doesn't clash with the Booking App's blue star or the Gig Dashboard's revenue bars -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/rep-icon-180.png">
    <link rel="apple-touch-icon" href="/icons/rep-icon-512.png">

    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent
    }

    html, body {
        height: 100%;
        background: #0B0D1A;
        color: #F0EDE6;
        font-family: Inter, sans-serif;
        font-size: 14px
    }

    #app {
        position: relative;
        height: 100vh;
        overflow: hidden
    }

    #sc {
        position: absolute;
        inset: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch
    }

    #ov {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, .85);
        align-items: center;
        justify-content: center;
        z-index: 200;
        padding: 12px
    }

    ::-webkit-scrollbar {
        width:4px
    }

    ::-webkit-scrollbar-thumb {
        background: #2E3260;
        border-radius: 2px
    }

    [data-hov]:hover {
        background: #161829;
        cursor: pointer
    }

    #syncbar {
        position: fixed;
        bottom: 14px;
        right: 14px;
        font-size: 11px;
        padding: 5px 13px;
        border-radius: 20px;
        z-index: 300;
        opacity: 0;
        transition: opacity .4s;
        pointer-events: none
    }

    #syncbar.show {
        opacity: 1
    }

    .desk-table, .desk-row {
        display: grid
    }

    .mob-card {
        display: none
    }

    @media (max-width: 680px) {
        .desk-table, .desk-row {
            display: none
        }

        .mob-card {
            display: block
        }

        .hdr-r button {
            font-size: 12px;
            padding: 6px 10px
        }

        .col-grid {
            grid-template-columns: 1fr !important
        }

        .notes-exp {
            padding-left: 14px !important
        }
    }
    </style>
</head>

        notes: "Classic coloring book routine:\n- Blank pages\n- Outlined pages (outlines only)\n- Fully colored pages\n- Blank again\n\nInteractive, fun for kids. Great participation moment."
    },
    {
        id: "m118",
        name: "Disappearing Silk for Kids",
        duration: 5,
        difficulty: "Beginner",
        status: "Active",
        roles: ["Feature"],
        contexts: ["Stage"],
        notes: "Silk or salt/sugar vanishes and reappears using thumb tip.\n\nClassic kids routine — simple, clean, allows for audience participation."
    },
    ];

    // App State
    let R = [],
        G = [],
        view = 'master',
        gid = null,
        modal = null,
        detailId = null;
    let cxF = [],
        roF = [],
        stF = 'Active',
        q = '';
    let expanded = new Set();
    let reordering = false;
    let reorderingGig = false;
    let saveTimer = null;
    function debounceSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => save(), 1200);
    }
    const isTemplate = g => g.type === 'template' || (g.client || '').toLowerCase() === 'template';
    let rF = {
        name: '',
        duration: '',
        difficulty: 'Intermediate',
        status: 'Active',
        roles: [],
        contexts: [],
        notes: '',
        props: []
    };
    let rEid = null,
        gF = {
            name: '',
            date: '',
            client: '',
            notes: ''
        },
        gEid = null,
        dN = '',
        dFr = null,
        pCx = [],
        pQ = '';
    let lastSave = 0;
    // Global set of prop names (lowercased) that are electronic devices needing a
    // charge. It's a property of the device, not the routine, so it lives at the root.
    let CHARGE = {};
    const needsCharge = label => !!CHARGE[String(label || '').toLowerCase()];

    // Helpers
    const uid = () => Math.random().toString(36).slice(2, 10);
    const fmt = m => !m ? '—' : +m >= 60 ? `${Math.floor(+m / 60)}h ${+m % 60}m` : `${m}m`;
    const tot = a => a.reduce((s, r) => s + (+r.duration || 0), 0);
    const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    const cg = () => G.find(g => g.id === gid);
    const gr = () => {
        const g = cg();
        return g ? g.routineIds.map(id => R.find(r => r.id === id)).filter(Boolean) : [];
    };
    const inG = id => !!cg()?.routineIds.includes(id);
    // Deduped prop list for the current gig, parsed live from each routine's
    // "Props:" notes line, in setlist order (each prop at its first appearance).
    const gigProps = () => {
        const m = {};
        gr().forEach(r => parsePropsFromNotes(r.notes).forEach(p => {
            const k = p.toLowerCase();
            if (!m[k]) m[k] = { label: p, routines: [] };
            m[k].routines.push(r.name);
        }));
        return Object.values(m);
    };

    // Firebase
    async function fbGet(path) {
        const r = await fetch(DB + path + '.json');
        return await r.json();
    }
    async function fbPut(path, data) {
        await fetch(DB + path + '.json', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });
    }

    function showSync(msg, color) {
        const b = document.getElementById('syncbar');
        b.textContent = msg;
        b.style.background = color || '#1E2140';
        b.style.color = color ? '#fff' : '#888CAA';
        b.classList.add('show');
        setTimeout(() => b.classList.remove('show'), 2800);
    }

    // Pull a "Props: a, b, c" line out of a routine's notes so existing routines
    // pre-fill their props list without re-typing. Non-destructive: notes are left as-is.
    function parsePropsFromNotes(notes) {
        const m = String(notes || '').match(/^\s*props?\s*:\s*(.+)$/im);
        if (!m) return [];
        return m[1].split(/[,;]+/).map(s => s.trim()).filter(Boolean);
    }

    // Normalize a routine/gig from storage. Used by BOTH load() and sync() so a
    // cloud copy pulled by sync gets the same shape (incl. props migration + packed),
    // otherwise sync would overwrite freshly-migrated props with a prop-less copy.
    const normR = r => ({
        id: r.id,
        name: r.name || '',
        duration: r.duration || 0,
        difficulty: r.difficulty || 'Intermediate',
        status: r.status || 'Active',
        roles: Array.isArray(r.roles) ? r.roles : [],
        contexts: Array.isArray(r.contexts) ? r.contexts : [],
        notes: r.notes || '',
        props: Array.isArray(r.props) ? r.props : parsePropsFromNotes(r.notes)
    });
    const normG = g => ({
        id: g.id,
        name: g.name || '',
        date: g.date || '',
        client: g.client || '',
        notes: g.notes || '',
        routineIds: Array.isArray(g.routineIds) ? g.routineIds : [],
        createdFrom: g.createdFrom || null,
        type: g.type || null,
        packed: (g.packed && typeof g.packed === 'object' && !Array.isArray(g.packed)) ? g.packed : {}
    });

    async function load() {
        // True if storage was missing props/packed and we derived them, so we can
        // persist once and stop re-deriving (which the sync could otherwise clobber).
        let needsMigrationSave = false;
        try {
            showSync('Loading…', '#2E3260');
            const data = await fbGet('/');
            if (data && data.routines) {
                const raw = Object.values(data.routines).filter(r => r && r.id && r.name);
                // Only worth persisting when a routine has real props in its notes but
                // none stored yet. Empty props don't persist in Firebase anyway, so
                // checking "no props field" alone would re-save every load pointlessly.
                if (raw.some(r => !Array.isArray(r.props) && parsePropsFromNotes(r.notes).length)) needsMigrationSave = true;
                R = raw.map(normR);
            } else {
                R = [...MY];
                await fbPut('/routines', MY.reduce((a, r) => ({
                    ...a,
                    [r.id]: r
                }), {}));
            }
            G = (data && data.gigs ? Object.values(data.gigs).filter(g => g && g.id && g.name) : []).map(normG);
            CHARGE = (data && data.chargeables && typeof data.chargeables === 'object' && !Array.isArray(data.chargeables)) ? data.chargeables : {};
            showSync('✓ Loaded');
        } catch (e) {
            R = [...MY];
            G = [];
            showSync('Offline — using local data', '#C9507A');
        }
        // Persist the one-time props/packed migration so it becomes real stored data.
        if (needsMigrationSave) {
            try { await save(); } catch (e) {}
        }
        // Check URL params from booking app: ?gig=<clientId>&date=&event=&name=&title=
        try {
            const params = new URLSearchParams(window.location.search);
            const pGig = params.get('gig');    // booking client id — stable link
            const pDate = params.get('date');
            const pName = params.get('name');
            const pEvent = params.get('event');
            const pTitle = params.get('title');
            const pView = params.get('view');
            const findByDate = () => {
                const byDate = G.filter(g => g.date === pDate && !isTemplate(g));
                if (byDate.length === 1) return byDate[0];
                if (byDate.length > 1 && pName) {
                    const nl = pName.toLowerCase();
                    return byDate.find(g => g.name.toLowerCase().includes(nl) || (g.client || '').toLowerCase().includes(nl)) || byDate[0];
                }
                return byDate.length ? byDate[0] : null;
            };
            if (pGig) {
                // Came from the booking dashboard: find the linked gig, else create it.
                let match = G.find(g => g.srcId === pGig && !isTemplate(g));
                if (!match && pDate) match = findByDate();
                if (!match) {
                    // First click for this booking -> create a new gig and open it to add routines
                    match = { id: uid(), name: (pTitle || pEvent || pName || 'New Gig'), client: pName || '', date: pDate || '', notes: '', routineIds: [], srcId: pGig };
                    G = [match, ...G];
                    try { await save(); } catch (e) {}
                } else if (!match.srcId) {
                    // Link an existing (date-matched) gig to this booking for future clicks
                    match.srcId = pGig;
                    try { await save(); } catch (e) {}
                }
                gid = match.id;
                view = 'gig';
            } else if (pDate && G.length) {
                const match = findByDate();
                if (match) { gid = match.id; view = 'gig'; }
                else view = 'gigs';
            } else if (pView === 'gigs') {
                view = 'gigs';
            }
        } catch (_) {}
        try {
            render();
        } catch (e) {
            document.getElementById('sc').innerHTML = `<div style="padding:40px;text-align:center;color:#C9507A;">
      <div style="font-size:18px;margin-bottom:12px;">Something went wrong.</div>
      <div style="font-size:13px;color:#555E7A;margin-bottom:24px;">${
            e.message}</div>
      <button onclick="location.reload()" style="background:#1E2140;color:#888CAA;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-family:inherit;font-size:14px;">Reload</button>
    </div>`

            ;
        }
        setInterval(sync, 20000);
    }

    async function save() {
        lastSave = Date.now();
        try {
            const ro = R.reduce((a, r) => ({
                ...a,
                [r.id]: r
            }), {});
            const go = G.reduce((a, g) => ({
                ...a,
                [g.id]: g
            }), {});
            await fbPut('/', {
                routines: ro,
                gigs: go,
                chargeables: CHARGE
            });
            showSync('✓ Synced across devices');
        } catch (e) {
            showSync('Save failed — check connection', '#C9507A');
        }
    }

    // Order- and property-order-insensitive serializer so a cloud copy that is
    // semantically identical (just reshuffled by Firebase) doesn't read as "changed".
    function stableStr(x) {
        if (Array.isArray(x))
            return '[' + x.map(stableStr).join(',') + ']';
        if (x && typeof x === 'object')
            return '{' + Object.keys(x).sort().map(k => JSON.stringify(k) + ':' + stableStr(x[k])).join(',') + '}';
        return JSON.stringify(x);
    }

    async function sync() {
        if (Date.now() - lastSave < 15000)
            return;
        // Don't clobber an in-progress edit: skip this cycle while a field is focused.
        const ae = document.activeElement;
        if (ae && ae.matches && ae.matches('textarea, input, [contenteditable="true"]'))
            return;
        try {
            const data = await fbGet('/');
            if (!data)
                return;
            const newR = data.routines ? Object.values(data.routines).filter(r => r && r.id && r.name).map(normR) : null;
            const newG = data.gigs ? Object.values(data.gigs).filter(g => g && g.id && g.name).map(normG) : null;
            const newC = (data.chargeables && typeof data.chargeables === 'object' && !Array.isArray(data.chargeables)) ? data.chargeables : {};
            const toMap = arr => (arr || []).reduce((a, x) => (a[x.id] = x, a), {});
            const ch = (newR && stableStr(toMap(newR)) !== stableStr(toMap(R))) ||
                       (newG && stableStr(toMap(newG)) !== stableStr(toMap(G))) ||
                       stableStr(newC) !== stableStr(CHARGE);
            if (ch) {
                if (newR)
                    R = newR;
                if (newG)
                    G = newG;
                CHARGE = newC;
                render();
                showSync('↓ Updated from another device', '#4E9C81');
            }
        } catch (e) {}
    }

    // UI Primitives
    const bdg = (l, c, sm) => `<span style="background:${c}22;color:${c};border:1px solid ${c}44;font-size:${sm ? 10 : 11}px;font-weight:600;padding:${sm ? '2px 7px' : '4px 11px'};border-radius:20px;white-space:nowrap;">${esc(l)}</span>`;
    const chip = (l, c, on, da) => `<button ${da} style="background:${on ? (c || '#C9A047') + '22' : 'transparent'};color:${on ? (c || '#C9A047') : '#555E7A'};border:1px solid ${on ? (c || '#C9A047') + '66' : '#1E2140'};border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:${on ? 600 : 400};">${esc(l)}</button>`;
    const btn = (l, da, v, sm) => {
        v = v || 'gh';
        const vs = {
            go: `background:#C9A047;color:#0B0D1A;border:none`,
            gh: `background:#1E2140;color:#888CAA;border:none`,
            re: `background:#C9507A22;color:#C9507A;border:none`,
            ot: `background:transparent;color:#C9A047;border:1px solid #2E3260`
        };
        return `<button ${da} style="${vs[v]};border-radius:8px;padding:${sm ? '5px 11px' : '9px 18px'};font-size:${sm ? 11 : 14}px;font-weight:${v === 'go' ? 700 : 500};cursor:pointer;font-family:inherit;">${l}</button>`;
    };
    const inp = (id, val, ph, tp) => `<input id="${id}" type="${tp || 'text'}" value="${esc(val || '')}" placeholder="${esc(ph || '')}" style="width:100%;background:#0F1120;border:1px solid #2E3260;border-radius:8px;padding:10px 12px;color:#F0EDE6;font-size:14px;outline:none;box-sizing:border-box;font-family:inherit;">`;
    const sel = (id, val, ops) => `<select id="${id}" style="width:100%;background:#0F1120;border:1px solid #2E3260;border-radius:8px;padding:10px 12px;color:#F0EDE6;font-size:14px;outline:none;box-sizing:border-box;font-family:inherit;">${ops.map(o => `<option${o === val ? ' selected' : ''}>${esc(o)}</option>`).join('')}</select>`;
    const ta = (id, val, ph, rows) => `<textarea id="${id}" rows="${rows || 4}" placeholder="${esc(ph || '')}" style="width:100%;background:#0F1120;border:1px solid #2E3260;border-radius:8px;padding:10px 12px;color:#F0EDE6;font-size:14px;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit;line-height:1.6;">${esc(val || '')}</textarea>`;
    const lb = l => `<div style="font-size:10px;color:#555E7A;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;">${l}</div>`;
    const TH = `font-size:10px;color:#555E7A;text-transform:uppercase;letter-spacing:.1em;font-weight:600;`;
    const GCOL = 'display:grid;grid-template-columns:30px 30px 2fr 1.5fr 1fr 60px 110px 90px;gap:8px;';

    // Header
    function rHeader() {

        let btns = '';

        else if (view === 'gigs')

        }
        return `<div style="border-bottom:1px solid #1E2140;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;background:#0B0D1A;z-index:10;flex-wrap:wrap;">
    <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;white-space:nowrap;color:#C9A047;">✦ The Repertoire</div>
    <div style="display:flex;gap:4px;">${
        nav('master', 'Master List')} ${nav('gigs', 'Gigs', 'gig')}</div>
    <div style="margin-left:auto;display:flex;gap:5px;align-items:center;flex-wrap:wrap;" class="hdr-r">${btns}</div>
  </div>`
        ;
    }

    // Master list view
    function rMaster() {
        const fil = R.filter(r => {
            if (stF !== 'All' && r.status !== stF)
                return false;
            if (cxF.length && !cxF.some(c => (r.contexts || []).includes(c)))
                return false;
            if (roF.length && !roF.some(c => (r.roles || []).includes(c)))
                return false;
            if (q && !r.name.toLowerCase().includes(q.toLowerCase()))
                return false;
            return true;
        });
        const dRows = fil.map((r, i) => `<div class="desk-row-wrap" style="border-bottom:${i < fil.length - 1 ? '1px solid #1E2140' : 'none'};">
    <div class="desk-row" style="${GCOL}padding:10px 16px;align-items:center;" data-hov="1">
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        ${
        reordering && i > 0 ? `<button data-a="mv-r-up" data-id="${r.id}" style="background:none;border:none;color:#C9A047;cursor:pointer;font-size:12px;padding:1px 4px;">▲</button>` : ''}
        ${reordering && i < fil.length - 1 ? `<button data-a="mv-r-dn" data-id="${r.id}" style="background:none;border:none;color:#C9A047;cursor:pointer;font-size:12px;padding:1px 4px;">▼</button>` : ''}
      </div>
      <button data-a="tog-expand" data-id="${
        r.id}" style="background:none;border:none;color:#555E7A;font-size:13px;cursor:pointer;padding:0;line-height:1;text-align:center;width:100%;">${expanded.has(r.id) ? '▼' : '▶'}</button>
      <div data-a="open-detail" data-id="${r.id}" style="font-weight:500;cursor:pointer;">${esc(r.name)}</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;">${(r.contexts || []).map(c => bdg(c, CC[c], true)).join('')}</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;">${(r.roles || []).map(rl => bdg(rl, RC[rl], true)).join('')}</div>
      <div style="font-size:13px;color:#888CAA;">${fmt(r.duration)}</div>
      <div style="font-size:12px;color:#555E7A;">${esc(r.difficulty)}</div>
      <div>${bdg(r.status, SC[r.status] || '#888CAA', true)}</div>
    </div>
    ${
        expanded.has(r.id) && r.notes ? `<div style="padding:6px 16px 10px 98px;background:#0F1120;border-top:1px solid #1E2140;"><textarea data-a="edit-notes" data-id="${r.id}" style="width:100%;background:transparent;border:none;outline:none;color:#888CAA;font-size:12px;line-height:1.7;font-family:inherit;resize:none;overflow:hidden;" placeholder="Add notes...">${esc(r.notes)}</textarea></div>` : ''}
  </div>`
        ).join('');
        const mCards = fil.map(r => `<div class="mob-card" style="background:#161829;border-radius:10px;border:1px solid #1E2140;padding:14px;margin-bottom:10px;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
      <div data-a="open-detail" data-id="${
        r.id}" style="font-weight:600;font-size:15px;flex:1;cursor:pointer;">${esc(r.name)}</div>
      <button data-a="tog-expand" data-id="${r.id}" style="background:none;border:none;color:#555E7A;font-size:16px;cursor:pointer;padding:0 0 0 10px;line-height:1;flex-shrink:0;">${expanded.has(r.id) ? '▼' : '▶'}</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">${
        (r.contexts || []).map(c => bdg(c, CC[c], true)).join('')}${(r.roles || []).map(rl => bdg(rl, RC[rl], true)).join('')}</div>
    <div style="display:flex;gap:12px;align-items:center;">${bdg(r.status, SC[r.status] || '#888CAA', true)}<span style="font-size:12px;color:#888CAA;">⏱ ${fmt(r.duration)}</span><span style="font-size:11px;color:#555E7A;">${esc(r.difficulty)}</span></div>
    ${expanded.has(r.id) && r.notes ? `<div style="margin-top:10px;background:#0F1120;border-radius:8px;padding:12px;font-size:12px;color:#888CAA;line-height:1.6;white-space:pre-wrap;">${esc(r.notes)}</div>` : ''}
  </div>`
        ).join('');
        return `<div style="padding:14px 20px;">
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;align-items:center;">
      <span style="font-size:10px;color:#555E7A;text-transform:uppercase;letter-spacing:.1em;">Context</span>
      ${

        CTX.map(c => chip(c, CC[c], cxF.includes(c), `data-a="tog-cx" data-v="${esc(c)}"`)).join('')}
      <div style="width:1px;height:16px;background:#1E2140;margin:0 2px;"></div>
      <span style="font-size:10px;color:#555E7A;text-transform:uppercase;letter-spacing:.1em;">Role</span>
      ${

        ROLES.map(r => chip(r, RC[r], roF.includes(r), `data-a="tog-ro" data-v="${esc(r)}"`)).join('')}
    </div>
    <div style="display:flex;gap:5px;margin-bottom:14px;align-items:center;flex-wrap:wrap;">
      <input id="srch" value="${

        esc(q)}" placeholder="Search…" style="background:#0F1120;border:1px solid #1E2140;border-radius:8px;padding:7px 12px;color:#F0EDE6;font-size:13px;outline:none;width:160px;font-family:inherit;">
      ${['All', 'Active', 'In Development', 'Retired'].map(s => chip(s, '', stF === s, `data-a="tog-st" data-v="${esc(s)}"`)).join('')}
      <span style="margin-left:auto;color:#555E7A;font-size:12px;">${fil.length} shown</span>
    </div>
    <div class="desk-table" style="border-radius:10px;border:1px solid #1E2140;overflow:hidden;">
      <div class="desk-row" style="${

        GCOL}background:#161829;border-bottom:1px solid #1E2140;padding:8px 16px;">${[reordering ? '↕' : '', '', 'Routine', 'Context', 'Role', 'Time', 'Difficulty', 'Status'].map(h => `<div style="${TH}">${h}</div>`).join('')}</div>
      ${fil.length ? dRows : `<div style="padding:40px 0;text-align:center;color:#555E7A;">No routines match your filters.</div>`}
    </div>
    <div>${
        fil.length ? mCards : `<div style="padding:40px 0;text-align:center;color:#555E7A;">No routines match.</div>`}</div>
  </div>`
        ;
    }

    // Gigs list view
    function rGigs() {
        if (!G.length)
            return `<div style="text-align:center;padding:80px 20px;color:#555E7A;">
    <div style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:10px;color:#C9A047;">No gigs yet</div>
    <div style="font-size:14px;margin-bottom:24px;">Create a show set or a reusable template.</div>
    ${

            btn('+ New Gig', 'data-a="open-add-g"', 'go')}
  </div>`
            ;

                const notIn = pl.filter(r => !inG(r.id));
                return `${inSet.length ? `<div style="font-size:10px;color:#C9A047;text-transform:uppercase;letter-spacing:.1em;padding:8px 14px 4px;background:#161829;">In Setlist (${inSet.length})</div>${inSet.map(rRow).join('<div style="height:1px;background:#1E2140;"></div>')}
        <div style="height:1px;background:#2E3260;"></div>` : ''}${notIn.length ? `<div style="font-size:10px;color:#555E7A;text-transform:uppercase;letter-spacing:.1em;padding:8px 14px 4px;background:#161829;">All Routines (${notIn.length})</div>${notIn.map(rRow).join('<div style="height:1px;background:#1E2140;"></div>')}` : `<div style="padding:28px 0;text-align:center;color:#555E7A;">No routines match.</div>`}`;
            };
            ov.innerHTML = `<div style="${bx(620)}" class="modal-box" id="mb">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;">Add Routines</div>
        <span style="font-size:12px;color:#888CAA;">"${

            esc(g?.name || '')}" · ${gr().length} in set</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">${
            CTX.map(c => chip(c, CC[c], pCx.includes(c), `data-a="pk-cx" data-v="${esc(c)}"`)).join('')}</div>
      <input id="pk-q" value="${esc(pQ)}" placeholder="Search ${R.length} routines…" style="width:100%;background:#0F1120;border:1px solid #1E2140;border-radius:8px;padding:8px 12px;color:#F0EDE6;font-size:13px;outline:none;margin-bottom:10px;box-sizing:border-box;font-family:inherit;">
      <div id="pk-list" style="max-height:360px;overflow-y:auto;border-radius:8px;border:1px solid #1E2140;display:flex;flex-direction:column;gap:0;">
        ${pkListHTML()}
      </div>
      ${
            ma(btn('Done ✓', 'data-a="close-modal"', 'go'))}
    </div>`
            ;
            setTimeout(() => {
                const pk = document.getElementById('pk-q');
                if (pk) {
                    pk.focus();
                    const end = pk.value.length;
                    pk.setSelectionRange(end, end);
                    pk.oninput = e => {
                        pQ = e.target.value;
                        const lst = document.getElementById('pk-list');
                        if (lst)
                            lst.innerHTML = pkListHTML();
                    };
                }
            }, 50);
        }
    }

    function render() {
        const wasFocused = document.activeElement?.id === 'srch';
        const cursorPos = wasFocused ? document.activeElement.selectionStart : null;
        let main = '';
        if (view === 'master')
            main = rMaster();
        else if (view === 'gigs')
            main = rGigs();
        else if (view === 'gig')
            main = rGigDetail();
        document.getElementById('sc').innerHTML = rHeader() + main;
        rModal();
        autoResizeTAs();
        const s = document.getElementById('srch');
        if (s) {
            s.oninput = e => {
                q = e.target.value;
                render();
            };
            if (wasFocused) {
                s.focus();
                if (cursorPos !== null)
                    s.setSelectionRange(cursorPos, cursorPos);
            }
        }
    }

    // Close modal clicking backdrop
    document.getElementById('ov').addEventListener('click', function(e) {
        if (e.target === this) {
            modal = null;
            render();
        }
    });
    function autoResizeTAs() {
        document.querySelectorAll('textarea[data-a="edit-notes"]').forEach(ta => {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
        });
    }

    document.getElementById('app').addEventListener('input', function(e) {
        const ta = e.target.closest('textarea[data-a="edit-notes"]');
        if (!ta)
            return;
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
        const id = ta.dataset.id;
        R = R.map(r => r.id === id ? {
            ...r,
            notes: ta.value
        } : r);
        debounceSave();
    });

    // All event handling
    document.getElementById('app').addEventListener('click', async function(e) {
        const el = e.target.closest('[data-a]');
        if (!el)
            return;
        const a = el.dataset.a,
            id = el.dataset.id,
            v = el.dataset.v;
        switch (a) {
        case 'nav-master':
            view = 'master';
            render();
            break;
        case 'nav-gigs':
            view = 'gigs';
            reorderingGig = false;
            render();
            break;
        case 'open-detail':
            detailId = id;
            modal = 'detail';
            rModal();
            break;
        case 'del-r-modal':
            if (!confirm('Delete this routine? This cannot be undone.'))
                break;
            R = R.filter(r => r.id !== id);
            G = G.map(g => ({
                ...g,
                routineIds: g.routineIds.filter(x => x !== id)
            }));
            modal = null;
            await save();
            render();
            break;
        case 'edit-from-detail':
            {
                const r = R.find(r => r.id === id);
                if (!r)
                    break;
                rF = {
                    name: r.name,
                    duration: r.duration,
                    difficulty: r.difficulty,
                    status: r.status,
                    roles: [...(r.roles || [])],
                    contexts: [...(r.contexts || [])],
                    notes: r.notes
                };
                rEid = id;
                modal = 'r';
                rModal();
                break;
            }
        case 'open-add-r':
            rF = {
                name: '',
                duration: 5,
                difficulty: 'Intermediate',
                status: 'Active',
                roles: ['Feature'],
                contexts: ['Stage'],
                notes: ''
            };
            rEid = null;
            modal = 'r';
            rModal();
            break;
        case 'rf-cx':
            {
                snapRF();
                rF.contexts = rF.contexts.includes(v) ? rF.contexts.filter(x => x !== v) : [...rF.contexts, v];
                rModalFocused();
                break;
            }
        case 'rf-ro':
            {
                snapRF();
                rF.roles = rF.roles.includes(v) ? rF.roles.filter(x => x !== v) : [...rF.roles, v];
                rModalFocused();
                break;
            }
        case 'tog-packed':
            {
                const k = v.toLowerCase();
                G = G.map(x => {
                    if (x.id !== gid)
                        return x;
                    const packed = { ...(x.packed || {}) };
                    if (packed[k])
                        delete packed[k];
                    else
                        packed[k] = true;
                    return { ...x, packed };
                });
                await save();
                render();
                break;
            }
        case 'reset-packed':
            G = G.map(x => x.id === gid ? { ...x, packed: {} } : x);
            await save();
            render();
            break;
        case 'tog-charge':
            {
                const k = v.toLowerCase();
                CHARGE = { ...CHARGE };
                if (CHARGE[k])
                    delete CHARGE[k];
                else
                    CHARGE[k] = true;
                await save();
                render();
                break;
            }
        case 'copy-props':
            {
                const cgg = cg();
                const list = gigProps();
                if (!cgg || !list.length)
                    break;
                const charge = list.filter(p => needsCharge(p.label));
                const chargeLine = charge.length ? '\n\n🔋 Charge the night before: ' + charge.map(p => p.label).join(', ') : '';
                const text = 'Props — ' + cgg.name + '\n' + list.map(p => '☐ ' + p.label + (needsCharge(p.label) ? ' 🔋' : '')).join('\n') + chargeLine;
                try {
                    await navigator.clipboard.writeText(text);
                    showSync('✓ Props list copied');
                } catch (e) {
                    showSync('Copy failed', '#C9507A');
                }
                break;
            }
        case 'save-r':
            {
                const n=document.getElementById('rf-name')?.value.trim();
                if (!n)
                    break;
                const nr = {
                    name: n,
                    duration: +(document.getElementById('rf-dur')?.value) || 5,
                    difficulty:document.getElementById('rf-diff')?.value,
                    status:document.getElementById('rf-stat')?.value,
                    roles: [...rF.roles],
                    contexts: [...rF.contexts],
                    notes: document.getElementById('rf-notes')?.value || ''
                };
                if (rEid)
                    R = R.map(r => r.id === rEid ? {
                        ...r,
                        ...nr
                    } : r);
                else
                    R = [...R, {
                        id: uid(),
                        ...nr
                    }];
                modal = null;
                await save();
                render();
                break;
            }
        case 'tog-expand':
            {
                if (expanded.has(id))
                    expanded.delete(id);
                else
                    expanded.add(id);
                render();
                break;
            }
        case 'edit-notes':
            {
                const ta = document.querySelector(`textarea[data-id="${id}"]`);
                if (!ta)
                    break;
                const val = ta.value;
                R = R.map(r => r.id === id ? {
                    ...r,
                    notes: val
                } : r);
                G = G.map(g => ({
                    ...g
                }));
                debounceSave();
                break;
            }
        case 'tog-reorder':
            {
                reordering = !reordering;
                render();
                break;
            }
        case 'tog-reorder-gig':
            {
                reorderingGig = !reorderingGig;
                render();
                break;
            }
        case 'mv-r-up':
            {
                const i = R.findIndex(r => r.id === id);
                if (i <= 0)
                    break;
                [R[i - 1], R[i]] = [R[i], R[i - 1]];
                await save();
                render();
                break;
            }
        case 'mv-r-dn':
            {
                const i = R.findIndex(r => r.id === id);
                if (i < 0 || i >= R.length - 1)
                    break;
                [R[i], R[i + 1]] = [R[i + 1], R[i]];
                await save();
                render();
                break;
            }
        case 'tog-cx':
            cxF = cxF.includes(v) ? cxF.filter(x => x !== v) : [...cxF, v];
            render();
            break;
        case 'tog-ro':
            roF = roF.includes(v) ? roF.filter(x => x !== v) : [...roF, v];
            render();
            break;
        case 'tog-st':
            stF = v;
            render();
            break;
        case 'open-add-g':
            gF = {
                name: '',
                date: '',
                client: '',
                notes: '',
                type: 'show'
            };
            gEid = null;
            modal = 'g';
            render();
            break;
        case 'edit-gig':
            {
                const g = cg();
                if (!g)
                    break;
                gF = {
                    name: g.name,
                    date: g.date || '',
                    client: g.client || '',
                    notes: g.notes || '',
                    type: g.type || 'show'
                };
                gEid = g.id;
                modal = 'g';
                render();
                break;
            }
        case 'save-g':
            {
                const n=document.getElementById('gf-name')?.value.trim();
                if (!n)
                    break;
                const ng = {
                    name: n,
                    date: document.getElementById('gf-date')?.value || '',
                    client: document.getElementById('gf-client')?.value || '',
                    notes: document.getElementById('gf-notes')?.value || '',
                    type: document.getElementById('gf-type')?.value || 'show'
                };
                if (gEid)
                    G = G.map(g => g.id === gEid ? {
                        ...g,
                        ...ng
                    } : g);
                else {
                    const newg = {
                        id: uid(),
                        ...ng,
                        routineIds: [],
                        createdFrom: null
                    };
                    G = [...G, newg];
                    gid = newg.id;
                    view = 'gig';
                }
                modal = null;
                await save();
                render();
                break;
            }
        case 'open-gig':
            gid = id;
            view = 'gig';
            render();
            break;
        case 'del-g':
            if (!confirm('Delete this gig? This cannot be undone.'))
                break;
            G = G.filter(g => g.id !== id);
            if (gid === id) {
                view = 'gigs';
                gid = null;
            }
            await save();
            render();
            break;
        case 'dup-gig':
            {
                const src = cg();
                if (!src)
                    break;
                dFr = src.id;
                dN = src.name + ' — Copy';
                modal = 'dup';
                render();
                break;
            }
        case 'dup-gig2':
            {
                const src = G.find(g => g.id === id);
                if (!src)
                    break;
                dFr = id;
                dN = src.name + ' — Copy';
                modal = 'dup';
                render();
                break;
            }
        case 'save-dup':
            {
                const n=document.getElementById('dup-name')?.value.trim();
                if (!n)
                    break;
                const src = G.find(g => g.id === dFr);
                if (!src)
                    break;
                const ng = {
                    ...src,
                    id: uid(),
                    name: n,
                    date: '',
                    createdFrom: src.id,
                    type: 'show'
                };
                G = [...G, ng];
                gid = ng.id;
                view = 'gig';
                modal = null;
                await save();
                render();
                break;
            }
        case 'assign-dup':
            {
                const src = G.find(g => g.id === dFr);
                const tgt = G.find(g => g.id === id);
                if (!src || !tgt)
                    break;
                const srcIds = src.routineIds || [];
                const cur = tgt.routineIds || [];
                let ids = [...srcIds];
                if (cur.length) {
                    const replace = confirm(`"${tgt.name}" already has ${cur.length} routine(s).\n\nOK = REPLACE them with the ${srcIds.length} from "${src.name}".\nCancel = ADD these on top of the existing ones.`);
                    if (!replace)
                        ids = [...cur, ...srcIds.filter(x => !cur.includes(x))];
                }
                G = G.map(g => g.id === tgt.id ? { ...g, routineIds: ids } : g);
                gid = tgt.id;
                view = 'gig';
                modal = null;
                await save();
                render();
                break;
            }
        case 'set-gig-type':
            {
                gF.type = v;
                const h = document.getElementById('gf-type');
                if (h)
                    h.value = v;
                rModal();
                break;
            }
        case 'open-picker':
            pCx = [];
            pQ = '';
            modal = 'picker';
            render();
            break;
        case 'pk-cx':
            pCx = pCx.includes(v) ? pCx.filter(x => x !== v) : [...pCx, v];
            rModal();
            break;
        case 'add-to-gig':
            {
                const g = cg();
                if (!g || g.routineIds.includes(id))
                    break;
                const pkScroll = document.getElementById('pk-list')?.scrollTop || 0;
                G = G.map(g => g.id === gid ? {
                    ...g,
                    routineIds: [...g.routineIds, id]
                } : g);
                await save();
                rModal();
                const pkl = document.getElementById('pk-list');
                if (pkl)
                    pkl.scrollTop = pkScroll;
                break;
            }
        case 'rem-from-gig':
            {
                const pkScroll = modal === 'picker' ? (document.getElementById('pk-list')?.scrollTop || 0) : 0;
                G = G.map(g => g.id === gid ? {
                    ...g,
                    routineIds: g.routineIds.filter(x => x !== id)
                } : g);
                await save();
                if (modal === 'picker') {
                    rModal();
                    const pkl = document.getElementById('pk-list');
                    if (pkl)
                        pkl.scrollTop = pkScroll;
                } else
                    render();
                break;
            }
        case 'mv-up':
            {
                const g = cg();
                if (!g)
                    break;
                const ids = [...g.routineIds],
                    i = ids.indexOf(id);
                if (i <= 0)
                    break;
                [ids[i - 1], ids[i]] = [ids[i], ids[i - 1]];
                G = G.map(g => g.id === gid ? {
                    ...g,
                    routineIds: ids
                } : g);
                await save();
                render();
                break;
            }
        case 'mv-dn':
            {
                const g = cg();
                if (!g)
                    break;
                const ids = [...g.routineIds],
                    i = ids.indexOf(id);
                if (i >= ids.length - 1)
                    break;
                [ids[i], ids[i + 1]] = [ids[i + 1], ids[i]];
                G = G.map(g => g.id === gid ? {
                    ...g,
                    routineIds: ids
                } : g);
                await save();
                render();
                break;
            }
        case 'close-modal':
            modal = null;
            render();
            break;
        }
    });

    load();
    </script>
</body>
</html>
